# Project-wide Gradle settings.
# IDE (e.g. Android Studio) users:
# Gradle settings configured through the IDE *will override*
# any settings specified in this file.
# For more details on how to configure your build environment visit
# http://www.gradle.org/docs/current/userguide/build_environment.html

# Optimización de memoria para el Daemon de Gradle
org.gradle.jvmargs=-Xmx4096m -XX:MaxMetaspaceSize=1024m -XX:+HeapDumpOnOutOfMemoryError -Dfile.encoding=UTF-8

# Ejecución en paralelo para proyectos con múltiples módulos
org.gradle.parallel=true

# Cache de Gradle para evitar recompilar lo que no ha cambiado
org.gradle.caching=true

# Configuración bajo demanda (útil en proyectos grandes)
org.gradle.configureondemand=true

# AndroidX package structure
android.useAndroidX=true

# Kotlin code style
kotlin.code.style=official

# R classes no transitivas para reducir el tamańo y mejorar velocidad
android.nonTransitiveRClass=true

# Habilitar KSP si es posible en el futuro (actualmente usa kapt)
# kapt.incremental.apt=true
